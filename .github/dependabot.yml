version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    target-branch: dev
    groups:
      mcp-sdk:
        patterns:
          - "@modelcontextprotocol/*"
      hono:
        patterns:
          - "hono"
          - "@hono/*"
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
          - "tsx"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    target-branch: dev

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    target-branch: dev
